name = "manageme-gateway"
main = "src/index.ts"
compatibility_date = "2026-07-15"
workers_dev = true

[observability]
enabled = true

[vars]
# PUBLIC_ORIGIN is inferred from the incoming Worker URL when omitted.
WEB_ORIGIN = "https://kornellvarga.github.io/manageMe/"
GITHUB_DATA_REPOSITORY = "kornellvarga/manageme-data"
GITHUB_DATA_BRANCH = "main"
GITHUB_DATA_PATH = "state.json"
ALLOWED_GITHUB_LOGIN = "kornellvarga"

# Configure secret values from .dev.vars.example with `wrangler secret put`.
