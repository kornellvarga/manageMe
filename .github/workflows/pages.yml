name: Publish ManageMe

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Keep the APK update signature stable
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: manageme-debug-keystore-v1

      - name: Build Android APK
        working-directory: ExpenseButtonTracker
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon
          cp app/build/outputs/apk/debug/app-debug.apk ../web/public/ManageMe.apk

      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.1"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build static GitHub Pages app
        working-directory: web
        env:
          NEXT_PUBLIC_BASE_PATH: /manageMe
          NEXT_PUBLIC_SITE_URL: https://kornellvarga.github.io/manageMe/
          NEXT_PUBLIC_MANAGEME_API_URL: ${{ vars.MANAGEME_API_URL }}
        run: |
          npm ci
          npm run check

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

